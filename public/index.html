<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Deals 17 - Daily Amazon Deals Up to $100</title>
    <meta name="description" content="Save 50-70% on Amazon products! Daily curated deals under $100. Follow @amazingdeals_17 on Instagram for more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🔥 Amazing Deals 17</h1>
            <p>Daily Amazon Deals • Follow <a href="https://instagram.com/amazingdeals_17" target="_blank">@amazingdeals_17</a></p>
        </div>
    </header>

    <main class="container">
        <!-- Search Bar -->
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Search for products, categories, or brands..." />
        </div>

        <!-- Category Filter Buttons -->
        <div class="category-section">
            <h3 class="filter-title">Shop by Category:</h3>
            <div class="category-buttons">
                <button class="category-btn active" data-category="all">
                    🔥 All Deals
                </button>
                <button class="category-btn" data-category="Electronics">
                    💻 Electronics
                </button>
                <button class="category-btn" data-category="Home & Kitchen">
                    🏠 Home & Kitchen
                </button>
                <button class="category-btn" data-category="Fashion">
                    👕 Fashion
                </button>
                <button class="category-btn" data-category="Beauty">
                    💄 Beauty
                </button>
                <button class="category-btn" data-category="Sports & Outdoors">
                    ⚽ Sports
                </button>
                <button class="category-btn" data-category="Toys & Games">
                    🎮 Toys & Games
                </button>
                <button class="category-btn" data-category="Books">
                    📚 Books
                </button>
            </div>
        </div>

        <!-- Price Filter -->
        <div class="price-filter-section">
            <h3 class="filter-title">Filter by Price:</h3>
            <div class="price-buttons">
                <button class="price-btn active" data-price="all">All Prices</button>
                <button class="price-btn" data-price="0-25">Under $25</button>
                <button class="price-btn" data-price="25-50">$25 - $50</button>
                <button class="price-btn" data-price="50-100">$50 - $100</button>
            </div>
        </div>

        <div id="statsBar" class="stats-bar">
            <span id="dealsCount">Loading deals...</span>
            <span id="lastUpdate"></span>
        </div>

        <div id="dealsGrid" class="deals-grid">
            <!-- Deals will be loaded here -->
        </div>
    </main>

    <footer>
        <p>💰 All prices and deals are subject to change. Check Amazon for current pricing.</p>
        <p>🔗 Affiliate Disclosure: We earn from qualifying purchases.</p>
        <p>Made with ❤️ by <a href="https://instagram.com/amazingdeals_17" target="_blank">@amazingdeals_17</a></p>
    </footer>

    <div class="scroll-top" id="scrollTop">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </div>

    <script src="script.js"></script>
</body>
</html>
