name: Daily Deals Scraper

on:
  schedule:
    # Runs every day at 9 AM UTC (adjust timezone as needed)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  scrape-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: npm run scrape

      - name: Get current date
        id: date
        run: echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Commit and push if changes
        env:
          COMMIT_DATE: ${{ steps.date.outputs.DATE }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/deals.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update deals - ${COMMIT_DATE}" && git push)
